<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Dashboard • SSE Practice</title>
    <style>
      body {
        font-family: system-ui;
        padding: 20px;
        background: #0f172a;
        color: #e2e8f0;
      }
      #feed {
        max-height: 70vh;
        overflow-y: auto;
        background: #1e2937;
        padding: 15px;
        border-radius: 12px;
      }
      .event {
        padding: 12px;
        margin: 8px 0;
        background: #334155;
        border-radius: 8px;
      }
      .event.order {
        border-left: 4px solid #22c55e;
      }
      .event.payment {
        border-left: 4px solid #a78bfa;
      }
    </style>
  </head>
  <body>
    <h1>🔔 Real-Time Dashboard (SSE)</h1>
    <div id="status" style="color: #22c55e">● Connected</div>

    <div style="margin: 20px 0">
      <input id="msg" placeholder="Type a message to broadcast" style="width: 60%; padding: 10px" />
      <button onclick="sendEvent()">Broadcast Event</button>
    </div>

    <h2>Live Activity Feed</h2>
    <div id="feed"></div>

    <script>
      const feed = document.getElementById("feed");
      const status = document.getElementById("status");

      const eventSource = new EventSource("/events");

      eventSource.onopen = () => {
        status.textContent = "● Connected (live updates enabled)";
        status.style.color = "#22c55e";
      };

      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);

        const div = document.createElement("div");
        div.className = `event ${data.type}`;
        div.innerHTML = `
        <strong>${data.type.toUpperCase()}</strong> 
        <span style="float:right; font-size:0.8em">${new Date(data.timestamp).toLocaleTimeString()}</span><br>
        ${data.message}
      `;
        feed.prepend(div); // newest on top

        // Auto-remove old messages (optional)
        if (feed.children.length > 50) feed.removeChild(feed.lastChild);
      };

      eventSource.onerror = () => {
        status.textContent = "⚠️ Connection lost (reconnecting...)";
        status.style.color = "#eab308";
      };

      // Send custom event
      function sendEvent() {
        const msg = document.getElementById("msg").value;
        if (!msg) return;

        fetch("/send-event", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        }).then(() => (document.getElementById("msg").value = ""));
      }
    </script>
  </body>
</html>
